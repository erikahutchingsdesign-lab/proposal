document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

m: uppercase; color: #A8822E;\">Get to the point<\u002Fdiv>\n            <h2 style=\"font-family: 'Playfair Display', serif; font-weight: 400; font-size: 23px; margin: 9px 0 0; color: #261F16; line-height: 1.2;\">The 30-second version<\u002Fh2>\n            <div style=\"display: flex; flex-direction: column; gap: 14px; margin-top: 18px;\">\n              <div style=\"display: flex; gap: 11px; align-items: flex-start;\">\n                <span style=\"flex: none; margin-top: 1px; width: 22px; height: 22px; border-radius: 7px; background: #F4ECD8; display: flex; align-items: center; justify-content: center;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#A8822E\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 12 L10 18 L20 6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                <span style=\"font-size: 14px; font-weight: 500; line-height: 1.45; color: #4A4334;\"><strong style=\"color: #2B251C; font-weight: 700;\">Two tracks<\u002Fstrong> — transform how our team works, then sell the same tools to clients.<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display: flex; gap: 11px; align-items: flex-start;\">\n                <span style=\"flex: none; margin-top: 1px; width: 22px; height: 22px; border-radius: 7px; background: #F4ECD8; display: flex; align-items: center; justify-content: center;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#A8822E\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 12 L10 18 L20 6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                <span style=\"font-size: 14px; font-weight: 500; line-height: 1.45; color: #4A4334;\"><strong style=\"color: #2B251C; font-weight: 700;\">A new role<\u002Fstrong> — a proposed Chief Creative &amp; AI Officer to lead it.<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display: flex; gap: 11px; align-items: flex-start;\">\n                < rder: 1px solid rgba(43,37,28,0.07); border-radius: 18px; padding: 24px 22px; box-shadow: 0 18px 40px -26px rgba(120,95,40,0.4);\">\n              <div style=\"font-family: 'Playfair Display', serif; font-size: 30px; color: #C2A24E; line-height: 1;\">01<\u002Fdiv>\n              <div style=\"margin-top: 12px; font-size: 15.5px; font-weight: 700; color: #2B251C;\">Chief Creative &amp; AI Officer<\u002Fdiv>\n              <div style=\"margin-top: 7px; font-size: 13.5px; font-weight: 400; line-height: 1.6; color: #7A7058;\">Or a similar title — a new role, with compensation to match, leading the build, rollout, and ongoing evolution of the platform across both the internal team and the client product.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background: #FFFFFF; border: 1px solid rgba(43,37,28,0.07); border-radius: 18px; padding: 24px 22px; box-shadow: 0 18px 40px -26px rgba(120,95,40,0.4);\">\n              <div style=\"font-family: 'Playfair Display', serif; font-size: 30px; color: #C2A24E; line-height: 1;\">02<\u002Fdiv>\n              <div style=\"margin-top: 12px; font-size: 15.5px; font-weight: 700; color: #2B251C;\">Growth-linked compensation<\u002Fdiv>\n              <div style=\"margin-top: 7px; font-size: 13.5px; font-weight: 400; line-height: 1.6; color: #7A7058;\">Compensation tracked to company performance and overall growth — aligned with the results the platform drives.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background: #FFFFFF; border: 1px solid rgba(43,37,28,0.07); border-radius: 18px; padding: 24px 22px; box-shadow: 0 18px 40px -26px rgba(120,95,40,0.4);\">\n              <div style=\"font-family: 'Playfair Display', serif; font-size: 30px; color: #C2A24E; line-height: 1;\">03<\u002Fdiv>\n              <div style=\"margin-top: 12px; font-size: 15.5px; font-weight: 700; color: #2B251C;\">Commission on subscriptions<\u002Fdiv>\n              <div style=\"margin-top: 7px; font-size: 13.5px; font-weight: 400; line-height: 1.6; color: #7A7058;\">Upside through commission on the recurring client subscription revenue the platform generates as it scales.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- 3-year plan -->\n        <section style=\"margin-top: 44px; animation: hcRise .6s ease .12s both;\">\n          <div style=\"display: flex; align-items: center; gap: 14px; margin-bottom: 22px;\">\n            <span style=\"font-family: 'Oswald', sans-serif; font-size: 17px; font-weight: 600; letter-spacing: 2.4px; text-transform: uppercase; color: #26221B; white-space: nowrap;\">A 3-Year (or Less) Plan<\u002Fspan>\n            <div style=\"flex: 1; height: 1px; background: rgba(43,37,28,0.12);\"><\u002Fdiv>\n            <span style=\"font-family: 'Oswald', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 1.4px; text-transform: uppercase; color: #A79E88; white-space: nowrap;\">Sample roadmap<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; align-items: stretch;\">\n\n            <!-- Year 1 -->\n            <div style=\"position: relative; display: flex; flex-direction: column; background: #FFFFFF; border: 1px solid rgba(43,37,28,0.08); border-radius: 18px; padding: 24px 22px; box-shadow: 0 18px 40px -26px rgba(120,95,40,0.4);\">\n              <div style=\"display: flex; align-items: center; gap: 11px;\">\n                <span style=\"flex: none; width: 40px; height: 40px; border-radius: 11px; background: linear-gradient(150deg, #C2A24E, #8A6A22); display: flex; align-items: center; justify-content: center; font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 1px; color: #FFF7E8; box-shadow: 0 8px 18px -8px rgba(120,90,30,0.6);\">Y1<\u002Fspan>\n                <div style=\"font-family: 'Oswald', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #A8822E;\"> , #1C160E); border: 1px solid rgba(194,162,78,0.4); border-radius: 18px; padding: 24px 22px; box-shadow: 0 30px 60px -30px rgba(70,52,18,0.7);\">\n              <div style=\"display: flex; align-items: center; gap: 11px;\">\n                <span style=\"flex: none; width: 40px; height: 40px; border-radius: 11px; background: linear-gradient(150deg, #E0C26A, #B08F35); display: flex; align-items: center; justify-content: center; font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 1px; color: #2B2417; box-shadow: 0 8px 18px -8px rgba(0,0,0,0.5);\">Y3<\u002Fspan>\n                <div style=\"font-family: 'Oswald', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #D9B95E;\">Year Three<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-family: 'Playfair Display', serif; font-size: 20px; color: #F6EFDD; margin-top: 16px;\">Scale for major growth<\u002Fdiv>\n              <p style=\"margin: 9px 0 0; font-size: 13.5px; font-weight: 400; line-height: 1.6; color: #C8BC9E;\">Push into mega-growth — a steady cadence of new features and templates, rising subscription volume, and meaningful recurring revenue.<\u002Fp>\n              <div style=\"margin-top: 14px; font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600; color: #D9B95E; letter-spacing: 1px;\">$$$<\u002Fdiv>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- ownership: what you own & what I own -->\n        <section style=\"margin-top: 44px; animation: hcRise .6s ease .14s both;\">\n          <div style=\"display: flex; align-items: center; gap: 14px; margin-bottom: 22px;\">\n            <span style=\"font-family: 'Oswald', sans-serif; font-size: 17px; font-weight: 600; letter-spacing: 2.4px; text-transform: uppercase; color: #26221B; white-space: nowrap;\">What You Own &amp; What I Own<\u002Fspan>\n            <div style=\"flex: 1; height: 1px; backgrou a(28,22,14,0.84); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); animation: hcFade .2s ease both;\">\n      <div onclick=\"{{ stop }}\" style=\"position: relative; width: min(1200px, 94vw); aspect-ratio: 16 / 9; max-height: 92vh; border-radius: 20px; overflow: hidden; background: #211B12; box-shadow: 0 60px 130px -30px rgba(0,0,0,0.7); animation: hcPop .3s cubic-bezier(.2,.85,.25,1) both;\">\n        <button onclick=\"{{ collapse }}\" title=\"Close\" style=\"appearance: none; position: absolute; top: 14px; right: 14px; z-index: 5; width: 42px; height: 42px; border-radius: 50%; border: 1px solid rgba(255,247,232,0.25); background: rgba(20,15,8,0.6); color: #F4ECDB; cursor: pointer; font-size: 20px; line-height: 1; display: flex; align-items: center; justify-content: center;\" style-hover=\"background: rgba(20,15,8,0.85);\">×<\u002Fbutton>\n        <sc-if value=\"{{ hasVideo }}\" hint-placeholder-val=\"{{ false }}\">\n          <iframe src=\"{{ videoUrl }}\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen\" allowfullscreen=\"{{ true }}\" style=\"position: absolute; inset: 0; width: 100%; height: 100%; border: 0;\"><\u002Fiframe>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noVideo }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; background: radial-gradient(700px 420px at 50% 32%, #34291A, #1C160E);\">\n            <div style=\"width: 84px; height: 84px; border-radius: 50%; background: linear-gradient(150deg, #C2A24E, #8A6A22); display: flex; align-items: center; justify-content: center; box-shadow: 0 18px 40px -16px rgba(0,0,0,0.6);\"><svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"#FFF7E8\"><path d=\"M8 5.5 L19 12 L8 18.5 Z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"font-family: 'Playfair Display', serif; font-size: 24px; color: #F4ECDB;\">Demo video coming soon<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <footer style=\"position: relative; z-index: 2; text-align: center; padding: 0 0 26px; font-size: 12px; font-weight: 500; color: #A79E88; letter-spacing: 0.4px;\">\n    Powered by Havener Sales &amp; Marketing · Confidential preview · Independently developed IP — not for distribution\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1100, &quot;height&quot;: 1240 },\n  &quot;projectName&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;HCP OS: The AI Marketing Platform&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Content&quot; },\n  &quot;allowedHashes&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;3e0897fb1cf8572c2341329f1264167b5916c4bb77bfa6ba32c6bad637644e0e, f2e64562c2f15bcfbd6f5bb2d4e799e1de119037926222f242b82306a6e66c9d&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Access&quot; },\n  &quot;requestEmail&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;hello@havenercapital.com&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Access&quot; },\n  &quot;videoUrl&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Content&quot; },\n  &quot;gateBlurb&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Enter your email to view the proof-of-concept summary and demo walkthrough.&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Content&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { email: '', denied: false, sessionEmail: '', expanded: false, attempts: 0, lockUntil: 0 };\n\n  componentDidMount() {\n    this._esc = (e) => { if (e.key === 'Escape') this.setState({ expanded: false }); };\n    window.addEventListener('keydown', this._esc);\n    // Validate a remembered session by hash, not by reading a stored allowlist.\n    try {\n      const saved = localStorage.getItem('demoAccessEmail');\n      if (saved) {\n        const val = saved.trim().toLowerCase();\n        this._sha256(val).then((h) => {\n          if (this._hashes().includes(h)) this.setState({ sessionEmail: val });\n          else { try { localStorage.removeItem('demoAccessEmail'); } catch (e) {} }\n        });\n      }\n    } catch (e) {}\n  }\n\n  componentWillUnmount() {\n    if (this._esc) window.removeEventListener('keydown', this._esc);\n  }\n\n  // SHA-256 hashes of the allowed emails — the actual addresses never appear in the page source.\n  _hashes() {\n    const raw = this.props.allowedHashes || '3e0897fb1cf8572c2341329f1264167b5916c4bb77bfa6ba32c6bad637644e0e, f2e64562c2f15bcfbd6f5bb2d4e799e1de119037926222f242b82306a6e66c9d';\n    return raw.split(/[\\s,;\\n]+/).map(s => s.trim().toLowerCase()).filter(Boolean);\n  }\n\n  async _sha256(s) {\n    const buf = new TextEncoder().encode(s);\n    const hash = await crypto.subtle.digest('SHA-256', buf);\n    return [...new Uint8Array(hash)].map((x) => x.toString(16).padStart(2, '0')).join('');\n  }\n\n  async submit(e) {\n    e.preventDefault();\n    if (Date.now() < this.state.lockUntil) { this.setState({ denied: true }); return; }\n    const val = (this.state.email || '').trim().toLowerCase();\n    let ok = false;\n    try { ok = !!val && this._hashes().includes(await this._sha256(val)); } catch (err) { ok = false; }\n    if (ok) {\n      try { localStorage.setItem('demoAccessEmail', val); } catch (err) {}\n      this.setState({ sessionEmail: val, denied: false, attempts: 0, lockUntil: 0 });\n    } else {\n      const attempts = this.state.attempts + 1;\n      const lockUntil = attempts >= 5 ? Date.now() + 30000 : 0;\n      this.setState({ denied: true, attempts, lockUntil });\n    }\n  }\n\n  signOut() {\n    try { localStorage.removeItem('demoAccessEmail'); } catch (e) {}\n    this.setState({ sessionEmail: '', email: '', denied: false });\n  }\n\n  renderVals() {\n    const unlocked = !!this.state.sessionEmail;\n    const projectName = this.props.projectName || 'HCP OS: The AI Marketing Platform';\n    const videoUrl = (this.props.videoUrl || '').trim();\n    const requestEmail = (this.props.requestEmail || 'hello@havenercapital.com').trim();\n\n    return {\n      // state flags\n      unlocked,\n      locked: !unlocked,\n      denied: this.state.denied,\n      email: this.state.email,\n      sessionEmail: this.state.sessionEmail,\n      inputBorder: this.state.denied ? '#D08A52' : 'rgba(43,37,28,0.14)',\n\n      // handlers\n      onEmail: (e) => this.setState({ email: e.target.value, denied: false }),\n      submit: (e) => this.submit(e),\n      signOut: () => this.signOut(),\n\n      // video expand\n      expandedOpen: this.state.expanded,\n      expand: () => this.setState({ expanded: true }),\n      collapse: () => this.setState({ expanded: false }),\n      stop: (e) => e.stopPropagation(),\n\n      // gate copy\n      projectName,\n      gateBlurb: this.props.gateBlurb || 'Enter your email to view the proof-of-concept summary and demo walkthrough.',\n      deniedMsg: (Date.now() < this.state.lockUntil)\n        ? 'Too many attempts — please wait a moment and try again.'\n        : (this.props.deniedMsg || \"That email isn't on the invite list for this preview.\"),\n      requestHref: 'mailto:' + requestEmail + '?subject=' + encodeURIComponent('Access request — ' + projectName),\n\n      // video\n      hasVideo: !!videoUrl,\n      noVideo: !videoUrl,\n      videoUrl,\n\n      // summary\n      summaryHeadline: this.props.summaryHeadline || 'Add your summary headline here',\n      summaryPara1: this.props.summaryPara1 || 'Use this space to introduce the platform: what problem it solves, who it is for, and what the demo shows. Click any text to edit it directly.',\n      summaryPara2: this.props.summaryPara2 || 'Add a second paragraph for context on the approach, the technology, or what reviewers should look for in the walkthrough above.',\n      hi1Title: this.props.hi1Title || 'What it does',\n      hi1Sub: this.props.hi1Sub || 'One line on the core capability.',\n      hi2Title: this.props.hi2Title || 'Why it matters',\n      hi2Sub: this.props.hi2Sub || 'The outcome or impact.',\n      hi3Title: this.props.hi3Title || 'Where it goes',\n      hi3Sub: this.props.hi3Sub || 'What is next after the POC.',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
